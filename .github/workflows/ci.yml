name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Biome Check
        run: npm run lint

      - name: Run Type Checking
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

      - name: Run Coverage
        run: npm run coverage

      - name: Build
        run: npm run build
        env:
          SERVER_API_URL: http://localhost:4000/graphql
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          INTERNAL_TOKEN: ci-placeholder-token
